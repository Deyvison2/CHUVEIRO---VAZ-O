<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HPS Chuveiro</title>
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 85%; max-width: 380px; text-align: center; }
        h1 { font-size: 22px; margin-bottom: 25px; color: #1c1c1e; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 13px; color: #8e8e93; margin-left: 5px; }
        input { width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #f9f9f9; }
        button { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; font-size: 18px; font-weight: 600; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        button:active { opacity: 0.7; transform: scale(0.98); }
        #resultado { margin-top: 25px; padding: 20px; border-radius: 15px; background: #e5f1ff; color: var(--blue); display: none; }
        .res-val { font-size: 28px; font-weight: 800; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h1>CHUVEIRO - VAZÃO</h1>
    
    <div class="input-group">
        <label>Primeiro Valor</label>
        <input type="number" id="v1" placeholder="0">
    </div>

    <div class="input-group">
        <label>Segundo Valor</label>
        <input type="number" id="v2" placeholder="0">
    </div>

    <div class="input-group">
        <label>Velocidade da Norea</label>
        <input type="number" id="vel" placeholder="0">
    </div>

    <button onclick="calcular()">Calcular Vazão</button>

    <div id="resultado">
        <span style="font-size: 14px; color: #555;">A vazão é:</span>
        <span class="res-val" id="res-val">0,000</span>
    </div>
</div>

<script>
    function calcular() {
        const v1 = parseFloat(document.getElementById('v1').value);
        const v2 = parseFloat(document.getElementById('v2').value);
        const vel = parseFloat(document.getElementById('vel').value);

        if (isNaN(v1) || isNaN(v2) || isNaN(vel) || vel === 0) {
            alert("Por favor, preencha todos os valores (Velocidade não pode ser 0).");
            return;
        }

        // Lógica idêntica ao seu Java
        const subtracao = v2 - v1;
        const vazao = subtracao / vel;

        const resBox = document.getElementById('resultado');
        const resVal = document.getElementById('res-val');

        resBox.style.display = 'block';
        // toFixed(3) para as 3 casas decimais que você pediu no código Java
        resVal.innerText = vazao.toFixed(3).replace('.', ',');
        
        // Vibração leve no celular ao calcular
        if (navigator.vibrate) navigator.vibrate(40);
    }
</script>

</body>
</html>
